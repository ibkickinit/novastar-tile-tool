<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nova Tile Diag</title>
<style>
  /* ── Reset & Base ───────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0a;
    --surface:   #141414;
    --surface2:  #1e1e1e;
    --border:    #2a2a2a;
    --text:      #e8e8e8;
    --text-dim:  #888;
    --accent:    #3d9eff;
    --ok:        #22c55e;
    --warn:      #f59e0b;
    --err:       #ef4444;

    --red:       #dc2626;
    --red-hl:    #ef4444;
    --green:     #16a34a;
    --green-hl:  #22c55e;
    --blue:      #1d4ed8;
    --blue-hl:   #3b82f6;
    --white:     #d1d5db;
    --white-hl:  #f9fafb;
    --grid-c:    #7c3aed;
    --grid-hl:   #a855f7;
    --off-c:     #374151;
    --off-hl:    #6b7280;

    --radius:    12px;
    --btn-h:     72px;
    --gap:       12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── Layout ─────────────────────────────────────────────────────────── */
  .app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 540px;
    margin: 0 auto;
    padding: 0 var(--gap) env(safe-area-inset-bottom);
  }

  /* ── Header ─────────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-title {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  .header-sub {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── Connection Status ───────────────────────────────────────────────── */
  .conn-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    margin: 10px 0;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.2s;
  }
  .conn-bar:active { border-color: var(--accent); }
  .conn-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .conn-dot.ok  { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .conn-dot.err { background: var(--err); }
  .conn-dot.checking { animation: pulse 1s infinite; background: var(--warn); }
  .conn-text { font-size: 0.82rem; color: var(--text-dim); flex: 1; }
  .conn-ip { font-size: 0.75rem; color: var(--text-dim); margin-left: auto; font-family: monospace; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Section Labels ──────────────────────────────────────────────────── */
  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 14px 0 6px;
  }

  /* ── Card Selector ───────────────────────────────────────────────────── */
  .card-selector {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .card-selector::-webkit-scrollbar { display: none; }

  .card-chip {
    flex-shrink: 0;
    height: 44px;
    min-width: 64px;
    padding: 0 16px;
    border-radius: 22px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .card-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(61,158,255,0.08);
  }
  .card-chip:active { transform: scale(0.96); }

  .card-count-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .card-count-label { font-size: 0.8rem; color: var(--text-dim); }
  .card-count-input {
    width: 60px;
    height: 34px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    text-align: center;
    -webkit-appearance: none;
  }
  .card-count-btn {
    height: 34px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.8rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .card-count-btn:active { background: var(--surface); }

  /* ── Test Mode Buttons ───────────────────────────────────────────────── */
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap);
    margin-top: 4px;
  }
  .mode-grid .btn-off {
    grid-column: 1 / -1;  /* OFF spans full width */
  }

  .mode-btn {
    height: var(--btn-h);
    border-radius: var(--radius);
    border: 2px solid transparent;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .mode-btn:active { transform: scale(0.97); }
  .mode-btn.active {
    border-color: white;
    box-shadow: 0 0 20px rgba(255,255,255,0.15);
  }
  .mode-btn.loading::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
  }

  .btn-red   { background: var(--red);   color: #fff; }
  .btn-red:hover   { background: var(--red-hl); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { background: var(--green-hl); }
  .btn-blue  { background: var(--blue);  color: #fff; }
  .btn-blue:hover  { background: var(--blue-hl); }
  .btn-white { background: var(--white); color: #111; }
  .btn-white:hover { background: var(--white-hl); }
  .btn-grid  { background: var(--grid-c); color: #fff; }
  .btn-grid:hover  { background: var(--grid-hl); }
  .btn-off   {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border);
    font-size: 0.95rem;
  }
  .btn-off:hover { background: var(--off-hl); }

  .btn-icon { font-size: 1.4rem; line-height: 1; }

  /* ── Status Area ─────────────────────────────────────────────────────── */
  .status-area {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    min-height: 56px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .status-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .status-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    flex-shrink: 0;
    min-width: 52px;
  }
  .status-value {
    font-size: 0.88rem;
    color: var(--text);
    font-weight: 500;
  }
  .status-value.ok  { color: var(--ok); }
  .status-value.err { color: var(--err); }
  .status-value.warn { color: var(--warn); }
  .status-time {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* ── Settings Panel ──────────────────────────────────────────────────── */
  .settings-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text-dim);
    cursor: pointer;
    padding: 8px 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .settings-toggle:active { color: var(--text); }
  .settings-chevron { transition: transform 0.2s; font-style: normal; }
  .settings-chevron.open { transform: rotate(90deg); }

  .settings-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    gap: 12px;
    flex-direction: column;
  }
  .settings-panel.open { display: flex; }

  .settings-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .settings-row label {
    font-size: 0.8rem;
    color: var(--text-dim);
    min-width: 90px;
    flex-shrink: 0;
  }
  .settings-input {
    flex: 1;
    height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.85rem;
    padding: 0 10px;
    font-family: monospace;
  }
  .settings-select {
    flex: 1;
    height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.85rem;
    padding: 0 8px;
    -webkit-appearance: none;
  }
  .settings-save {
    height: 36px;
    padding: 0 16px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .settings-save:active { background: rgba(61,158,255,0.1); }

  /* ── Footer ──────────────────────────────────────────────────────────── */
  footer {
    margin-top: auto;
    padding: 12px 0 8px;
    text-align: center;
    font-size: 0.68rem;
    color: var(--border);
    flex-shrink: 0;
  }

  /* ── Active mode indicator in header ────────────────────────────────── */
  .active-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.2s;
  }
  .active-badge.lit { border-color: currentColor; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div>
      <div class="header-title">Nova Tile Diag</div>
      <div class="header-sub">LED Receiving Card Test Patterns</div>
    </div>
    <div class="active-badge" id="activeBadge">
      <span id="activeDot" style="width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block"></span>
      <span id="activeLabel">STANDBY</span>
    </div>
  </header>

  <!-- Connection status -->
  <div class="conn-bar" id="connBar" onclick="checkConnection()" title="Tap to recheck">
    <div class="conn-dot" id="connDot"></div>
    <div class="conn-text" id="connText">Checking connection...</div>
    <div class="conn-ip" id="connIP"></div>
  </div>

  <!-- Card selector -->
  <div class="section-label">Target Card</div>
  <div class="card-selector" id="cardSelector">
    <div class="card-chip active" data-card="all" onclick="selectCard(this)">ALL</div>
  </div>
  <div class="card-count-row">
    <span class="card-count-label">Cards in chain:</span>
    <input class="card-count-input" type="number" id="cardCount" value="1" min="1" max="64">
    <button class="card-count-btn" onclick="updateCardChips()">Update</button>
  </div>

  <!-- Test mode buttons -->
  <div class="section-label" style="margin-top:18px">Test Pattern</div>
  <div class="mode-grid">
    <button class="mode-btn btn-red"   onclick="sendMode('red')"  >
      <span class="btn-icon">&#9632;</span> Red
    </button>
    <button class="mode-btn btn-green" onclick="sendMode('green')">
      <span class="btn-icon">&#9632;</span> Green
    </button>
    <button class="mode-btn btn-blue"  onclick="sendMode('blue')" >
      <span class="btn-icon">&#9632;</span> Blue
    </button>
    <button class="mode-btn btn-white" onclick="sendMode('white')">
      <span class="btn-icon">&#9633;</span> White
    </button>
    <button class="mode-btn btn-grid"  onclick="sendMode('grid')" >
      <span class="btn-icon">&#9638;</span> Grid
    </button>
    <button class="mode-btn btn-off btn-off" onclick="sendMode('off')"  >
      &#10006; NORMAL / OFF
    </button>
  </div>

  <!-- Status -->
  <div class="status-area">
    <div class="status-row">
      <span class="status-label">Status</span>
      <span class="status-value" id="statusText">Ready</span>
      <span class="status-time" id="statusTime"></span>
    </div>
    <div class="status-row">
      <span class="status-label">Last cmd</span>
      <span class="status-value" id="lastCmd">—</span>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-toggle" onclick="toggleSettings()" style="margin-top:16px">
    <em class="settings-chevron" id="settingsChevron">&#9658;</em>
    Settings
  </div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-row">
      <label>Sending Card IP</label>
      <input class="settings-input" id="ipInput" type="text"
             placeholder="192.168.0.10" inputmode="decimal">
    </div>
    <div class="settings-row">
      <label>Protocol</label>
      <select class="settings-select" id="protoSelect">
        <option value="TCP">TCP (port 5200)</option>
        <option value="UDP">UDP (port 5201)</option>
      </select>
    </div>
    <div class="settings-row" style="justify-content:flex-end">
      <button class="settings-save" onclick="saveSettings()">Apply &amp; Reconnect</button>
    </div>
  </div>

  <footer>Novastar T10 Field Diagnostic Tool &nbsp;|&nbsp; v1.0</footer>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const state = {
  selectedCard: "all",
  activeMode:   null,
  busy:         false,
  connected:    null,
};

const MODE_COLORS = {
  red:   "#dc2626",
  green: "#16a34a",
  blue:  "#3b82f6",
  white: "#e5e7eb",
  grid:  "#a855f7",
  off:   null,
};

// ── Card chip management ─────────────────────────────────────────────────────
function updateCardChips() {
  const count = Math.min(64, Math.max(1, parseInt(document.getElementById("cardCount").value) || 1));
  document.getElementById("cardCount").value = count;

  const sel = document.getElementById("cardSelector");
  sel.innerHTML = '<div class="card-chip" data-card="all" onclick="selectCard(this)">ALL</div>';
  for (let i = 0; i < count; i++) {
    const chip = document.createElement("div");
    chip.className = "card-chip";
    chip.dataset.card = String(i);
    chip.textContent = `#${i}`;
    chip.onclick = function() { selectCard(this); };
    sel.appendChild(chip);
  }
  // Re-select current
  const chips = sel.querySelectorAll(".card-chip");
  chips.forEach(c => {
    if (c.dataset.card === state.selectedCard) c.classList.add("active");
  });
  // Default back to ALL if current card no longer in range
  if (state.selectedCard !== "all" && parseInt(state.selectedCard) >= count) {
    selectCard(sel.querySelector('[data-card="all"]'));
  }
}

function selectCard(el) {
  document.querySelectorAll(".card-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  state.selectedCard = el.dataset.card;
}

// ── Mode buttons ─────────────────────────────────────────────────────────────
function setActiveBadge(mode) {
  const badge = document.getElementById("activeBadge");
  const dot   = document.getElementById("activeDot");
  const label = document.getElementById("activeLabel");

  if (!mode || mode === "off") {
    badge.className = "active-badge";
    badge.style.color = "";
    label.textContent = "NORMAL";
  } else {
    const color = MODE_COLORS[mode] || "#888";
    badge.className = "active-badge lit";
    badge.style.color = color;
    label.textContent = mode.toUpperCase();
  }
}

function setStatus(text, cls, cmd) {
  const sv = document.getElementById("statusText");
  sv.textContent = text;
  sv.className = "status-value" + (cls ? " " + cls : "");

  if (cmd !== undefined) {
    document.getElementById("lastCmd").textContent = cmd;
  }
  const now = new Date();
  document.getElementById("statusTime").textContent =
    now.toTimeString().slice(0,8);
}

async function sendMode(mode) {
  if (state.busy) return;
  state.busy = true;

  const cardStr  = state.selectedCard === "all" ? "all cards" : `card #${state.selectedCard}`;
  const cmdLabel = `${mode.toUpperCase()} → ${cardStr}`;

  // Visual feedback immediately
  document.querySelectorAll(".mode-btn").forEach(b => {
    b.classList.remove("active");
    b.classList.add("loading");
  });
  setStatus("Sending...", "warn", cmdLabel);

  try {
    const resp = await fetch("/testmode", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ card: state.selectedCard, mode }),
    });

    const data = await resp.json();

    if (data.ok) {
      state.activeMode = mode;
      setActiveBadge(mode);
      setStatus(data.warning ? `OK (${data.warning})` : "OK", "ok", cmdLabel);
    } else {
      setStatus(`Error: ${data.error}`, "err", cmdLabel);
    }
  } catch (err) {
    setStatus(`Network error: ${err.message}`, "err", cmdLabel);
  } finally {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("loading"));
    // Highlight active mode button
    const modeClass = "btn-" + mode;
    document.querySelectorAll(".mode-btn").forEach(b => {
      if (b.classList.contains(modeClass)) b.classList.add("active");
    });
    state.busy = false;
  }
}

// ── Connection check ──────────────────────────────────────────────────────────
async function checkConnection() {
  const dot  = document.getElementById("connDot");
  const text = document.getElementById("connText");
  const ipEl = document.getElementById("connIP");

  dot.className  = "conn-dot checking";
  text.textContent = "Checking...";

  try {
    const resp = await fetch("/status", { signal: AbortSignal.timeout(5000) });
    const data = await resp.json();

    state.connected = data.ok;
    dot.className   = "conn-dot " + (data.ok ? "ok" : "err");
    text.textContent = data.message;
    if (data.config) {
      ipEl.textContent = `${data.config.sendingCardIP}`;
    }
  } catch (err) {
    dot.className   = "conn-dot err";
    text.textContent = "Cannot reach server";
    ipEl.textContent = "";
  }
}

// ── Settings ──────────────────────────────────────────────────────────────────
function toggleSettings() {
  const panel   = document.getElementById("settingsPanel");
  const chevron = document.getElementById("settingsChevron");
  const isOpen  = panel.classList.toggle("open");
  chevron.classList.toggle("open", isOpen);
}

async function loadConfig() {
  try {
    const resp = await fetch("/config");
    const data = await resp.json();
    document.getElementById("ipInput").value = data.sendingCardIP || "";
    document.getElementById("protoSelect").value = data.protocol || "TCP";
  } catch (e) { /* ignore */ }
}

async function saveSettings() {
  const ip    = document.getElementById("ipInput").value.trim();
  const proto = document.getElementById("protoSelect").value;

  if (!ip) { setStatus("Enter a valid IP", "err"); return; }

  try {
    const resp = await fetch("/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sendingCardIP: ip, protocol: proto }),
    });
    const data = await resp.json();
    if (data.ok) {
      setStatus("Settings saved", "ok");
      await checkConnection();
    } else {
      setStatus(`Error: ${data.error}`, "err");
    }
  } catch (err) {
    setStatus(`Save failed: ${err.message}`, "err");
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  await loadConfig();
  checkConnection();
  // Re-check every 30s
  setInterval(checkConnection, 30000);
})();
</script>
</body>
</html>
